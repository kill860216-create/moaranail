<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 모아라네일</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: #F5F5F5; color: #1a1a1a; }

    .btn-primary {
      background: #fba700; color: #fff;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover  { background: #e09600; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(251,167,0,0.3); }
    .btn-primary:focus  { outline: none; box-shadow: 0 0 0 3px rgba(251,167,0,0.35); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      border: 1.5px solid #e5e7eb; color: #6b7280; background: transparent;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn-ghost:hover  { background: #fff7e6; color: #fba700; border-color: #fba700; }
    .btn-ghost:focus  { outline: none; box-shadow: 0 0 0 3px rgba(251,167,0,0.2); }
    .btn-ghost:active { transform: scale(0.98); }

    .badge-pending  { background: #FEF3C7; color: #D97706; border: 1px solid #FCD34D; }
    .badge-complete { background: #D1FAE5; color: #059669; border: 1px solid #6EE7B7; }

    tr.data-row:hover { background: #fffbf0; cursor: pointer; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }
    .modal-box {
      background: #fff; border-radius: 1rem; max-width: 520px; width: 100%;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    input:focus { outline: none; border-color: #fba700 !important; box-shadow: 0 0 0 3px rgba(251,167,0,0.15); }
  </style>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="loginScreen">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm mx-4">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4" style="background:#FEF3C7;">
          <svg class="w-7 h-7" style="color:#fba700;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-xl font-semibold" style="color:#1a1a1a;">모아라네일 관리자</h1>
        <p class="text-sm mt-1" style="color:#9ca3af;">비밀번호를 입력하세요</p>
      </div>
      <div class="space-y-3">
        <input type="password" id="pwInput" placeholder="비밀번호"
          class="w-full px-4 py-3 rounded-xl border text-sm"
          style="border-color:#e5e7eb; transition: border-color 0.2s;"
          onkeydown="if(event.key==='Enter') login()">
        <p id="pwError" class="hidden text-xs text-center" style="color:#ef4444;">비밀번호가 올바르지 않습니다</p>
        <button onclick="login()" class="btn-primary w-full py-3 rounded-xl text-sm font-medium">
          로그인
        </button>
      </div>
    </div>
  </div>

  <!-- ── Dashboard ── -->
  <div id="dashboard" class="hidden">

    <!-- Top bar -->
    <header class="bg-white border-b sticky top-0 z-40" style="border-color:#f0f0f0;">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div>
          <span class="font-semibold text-base" style="color:#1a1a1a;">모아라네일</span>
          <span class="text-xs ml-2 px-2 py-0.5 rounded-full" style="background:#FEF3C7; color:#D97706;">관리자</span>
        </div>
        <div class="flex items-center gap-3">
          <a href="index.html" target="_blank">
            <button class="btn-ghost px-4 py-2 rounded-full text-xs">사이트 보기</button>
          </a>
          <button onclick="logout()" class="btn-ghost px-4 py-2 rounded-full text-xs">로그아웃</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-2xl p-5 shadow-sm border" style="border-color:#f0f0f0;">
          <p class="text-xs mb-1" style="color:#9ca3af;">전체 문의</p>
          <p id="statTotal" class="text-3xl font-bold" style="color:#1a1a1a;">—</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border" style="border-color:#f0f0f0;">
          <p class="text-xs mb-1" style="color:#9ca3af;">오늘 접수</p>
          <p id="statToday" class="text-3xl font-bold" style="color:#fba700;">—</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border" style="border-color:#f0f0f0;">
          <p class="text-xs mb-1" style="color:#9ca3af;">미처리</p>
          <p id="statPending" class="text-3xl font-bold" style="color:#D97706;">—</p>
        </div>
      </div>

      <!-- Filter -->
      <div class="flex gap-2 mb-5">
        <button onclick="setFilter('all')" id="tab-all"
          class="px-4 py-2 rounded-full text-sm font-medium transition-colors"
          style="background:#fba700; color:#fff;">전체</button>
        <button onclick="setFilter('pending')" id="tab-pending"
          class="px-4 py-2 rounded-full text-sm font-medium transition-colors"
          style="background:#fff; color:#6b7280; border:1.5px solid #e5e7eb;">대기중</button>
        <button onclick="setFilter('complete')" id="tab-complete"
          class="px-4 py-2 rounded-full text-sm font-medium transition-colors"
          style="background:#fff; color:#6b7280; border:1.5px solid #e5e7eb;">완료</button>
        <button onclick="loadData()" class="ml-auto btn-ghost px-4 py-2 rounded-full text-xs">새로고침</button>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl shadow-sm border overflow-hidden" style="border-color:#f0f0f0;">
        <div class="overflow-x-auto">
          <table class="w-full" style="min-width:680px;">
            <thead>
              <tr style="background:#FAFAFA; border-bottom:1px solid #f0f0f0;">
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">이름</th>
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">연락처</th>
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">서비스</th>
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">문의 내용</th>
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">접수일</th>
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">상태</th>
                <th class="py-3 px-4 text-left text-xs font-medium" style="color:#9ca3af;">처리</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="7" class="py-16 text-center text-sm" style="color:#9ca3af;">불러오는 중…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- ── Detail Modal ── -->
  <div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-box">
      <div class="p-6 border-b" style="border-color:#f0f0f0;">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold" style="color:#1a1a1a;">문의 상세</h2>
          <button onclick="document.getElementById('modal').classList.add('hidden')"
            class="text-gray-400 hover:text-gray-600 transition-colors text-xl leading-none">×</button>
        </div>
      </div>
      <div id="modalContent" class="p-6 space-y-4"></div>
      <div class="p-6 pt-0 flex gap-3">
        <button id="modalCompleteBtn" onclick="markComplete()"
          class="btn-primary flex-1 py-2.5 rounded-xl text-sm font-medium">완료 처리</button>
        <button onclick="document.getElementById('modal').classList.add('hidden')"
          class="btn-ghost flex-1 py-2.5 rounded-xl text-sm">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tylmxvrkpukaldoznuwb.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5bG14dnJrcHVrYWxkb3pudXdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYxMDQsImV4cCI6MjA5NzE5MjEwNH0.EkIjICI72zPta2bdgZlv3qL7iTT-lHi7Vo2_0YgfOdE';
    const ADMIN_PW = 'moaranail2024';

    let db = null;
    function getDb() {
      if (!db) {
        try { db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); }
        catch(e) { alert('DB 연결 오류. 새로고침 해주세요.'); return null; }
      }
      return db;
    }

    let allRows = [];
    let currentFilter = 'all';
    let selectedId = null;

    // ── Auth ──────────────────────────────────────────────────────────────────
    let sessionTimer = null;

    function login() {
      const val = document.getElementById('pwInput').value;
      if (val === ADMIN_PW) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        sessionStorage.setItem('moaranail_admin', '1');
        loadData();
        resetSessionTimer();
      } else {
        const err = document.getElementById('pwError');
        err.classList.remove('hidden');
        setTimeout(() => err.classList.add('hidden'), 3000);
      }
    }

    function logout() {
      sessionStorage.removeItem('moaranail_admin');
      clearTimeout(sessionTimer);
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('pwInput').value = '';
    }

    function resetSessionTimer() {
      clearTimeout(sessionTimer);
      sessionTimer = setTimeout(logout, 30 * 60 * 1000); // 30분
    }
    document.addEventListener('click', resetSessionTimer);

    // ── Data ──────────────────────────────────────────────────────────────────
    async function loadData() {
      const client = getDb(); if (!client) return;
      const { data, error } = await client
        .from('consultations')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="7" class="py-16 text-center text-sm" style="color:#ef4444;">데이터 로드 실패: ${error.message}</td></tr>`;
        return;
      }

      allRows = data || [];
      updateStats();
      renderTable();
    }

    function updateStats() {
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('statTotal').textContent   = allRows.length;
      document.getElementById('statToday').textContent   = allRows.filter(r => r.created_at?.slice(0,10) === today).length;
      document.getElementById('statPending').textContent = allRows.filter(r => r.status === 'pending').length;
    }

    function setFilter(f) {
      currentFilter = f;
      ['all','pending','complete'].forEach(id => {
        const btn = document.getElementById('tab-' + id);
        if (id === f) {
          btn.style.background = '#fba700';
          btn.style.color = '#fff';
          btn.style.border = 'none';
        } else {
          btn.style.background = '#fff';
          btn.style.color = '#6b7280';
          btn.style.border = '1.5px solid #e5e7eb';
        }
      });
      renderTable();
    }

    function renderTable() {
      const filtered = allRows.filter(r => {
        if (currentFilter === 'pending')  return r.status === 'pending';
        if (currentFilter === 'complete') return r.status === 'complete';
        return true;
      });

      if (filtered.length === 0) {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="7" class="py-16 text-center text-sm" style="color:#9ca3af;">문의 내역이 없습니다</td></tr>`;
        return;
      }

      document.getElementById('tableBody').innerHTML = filtered.map(r => {
        const date = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '-';
        const preview = (r.message || '').slice(0, 28) + ((r.message || '').length > 28 ? '…' : '');
        const badge = r.status === 'complete'
          ? '<span class="badge-complete text-xs px-2 py-0.5 rounded-full font-medium">완료</span>'
          : '<span class="badge-pending text-xs px-2 py-0.5 rounded-full font-medium">대기중</span>';
        const actionBtn = r.status === 'pending'
          ? `<button onclick="event.stopPropagation(); quickComplete('${r.id}')"
               class="text-xs px-3 py-1.5 rounded-lg transition-colors"
               style="background:#D1FAE5; color:#059669; border:1px solid #6EE7B7;">완료</button>`
          : `<span class="text-xs" style="color:#d1d5db;">-</span>`;

        return `<tr class="data-row border-b" style="border-color:#f9f9f9;" onclick="openModal('${r.id}')">
          <td class="py-3 px-4 text-sm font-medium" style="color:#1a1a1a;">${r.name || '-'}</td>
          <td class="py-3 px-4 text-sm" style="color:#4b5563;">${r.phone || '-'}</td>
          <td class="py-3 px-4 text-sm" style="color:#4b5563;">${r.service || '-'}</td>
          <td class="py-3 px-4 text-sm" style="color:#6b7280;">${preview || '-'}</td>
          <td class="py-3 px-4 text-xs" style="color:#9ca3af;">${date}</td>
          <td class="py-3 px-4">${badge}</td>
          <td class="py-3 px-4">${actionBtn}</td>
        </tr>`;
      }).join('');
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function openModal(id) {
      const r = allRows.find(x => x.id === id);
      if (!r) return;
      selectedId = id;

      const date = r.created_at
        ? new Date(r.created_at).toLocaleString('ko-KR')
        : '-';

      const fields = [
        ['이름',     r.name],
        ['연락처',   r.phone],
        ['서비스',   r.service],
        ['문의 내용', r.message],
        ['접수일시', date],
        ['상태',     r.status === 'complete' ? '완료' : '대기중'],
      ];

      document.getElementById('modalContent').innerHTML = fields.map(([label, val]) => `
        <div>
          <p class="text-xs mb-1 font-medium" style="color:#9ca3af;">${label}</p>
          <p class="text-sm" style="color:#1a1a1a; word-break:break-all;">${val || '-'}</p>
        </div>
      `).join('');

      const btn = document.getElementById('modalCompleteBtn');
      if (r.status === 'complete') {
        btn.textContent = '이미 완료된 문의입니다';
        btn.disabled = true;
        btn.style.opacity = '0.4';
        btn.style.cursor = 'not-allowed';
      } else {
        btn.textContent = '완료 처리';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.cursor = '';
      }

      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.add('hidden');
      }
    }

    // ── Status Update ─────────────────────────────────────────────────────────
    async function markComplete() {
      if (!selectedId) return;
      await updateStatus(selectedId);
      document.getElementById('modal').classList.add('hidden');
    }

    async function quickComplete(id) {
      await updateStatus(id);
    }

    async function updateStatus(id) {
      const client = getDb(); if (!client) return;
      const { error } = await client
        .from('consultations')
        .update({ status: 'complete' })
        .eq('id', id);

      if (error) { alert('업데이트 실패: ' + error.message); return; }

      const row = allRows.find(r => r.id === id);
      if (row) row.status = 'complete';
      updateStats();
      renderTable();
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    if (sessionStorage.getItem('moaranail_admin')) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      loadData();
      resetSessionTimer();
    }
  </script>

</body>
</html>
