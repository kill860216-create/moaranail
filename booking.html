<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 현황 | 모아라네일</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { background: #FAFAF7; font-family: 'Noto Sans KR', sans-serif; color: #1C1B1A; }

    .slot-available {
      background: #F0FBF4; border: 1.5px solid #86EFAC; color: #15803D;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%; border-radius: 0.5rem; padding: 0.375rem 0; font-size: 0.7rem; font-weight: 500;
      min-width: 50px;
    }
    .slot-available:hover { background: #dcfce7; transform: scale(0.96); }

    .slot-full {
      background: #FFF1F1; border: 1.5px solid #FCA5A5; color: #DC2626;
      cursor: default;
      width: 100%; border-radius: 0.5rem; padding: 0.375rem 0; font-size: 0.7rem; font-weight: 500;
      min-width: 50px;
    }

    .btn-primary {
      background: #C8956C; color: #fff;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover  { background: #B37F58; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,149,108,0.32); }
    .btn-primary:focus  { outline: none; box-shadow: 0 0 0 3px rgba(200,149,108,0.4); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      border: 1.5px solid #E8E4DF; color: #6B6560; background: transparent;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .btn-ghost:hover  { background: #F5EDE4; color: #C8956C; border-color: #C8956C; }
    .btn-ghost:active { transform: scale(0.98); }

    #slot-tooltip {
      position: fixed;
      background: rgba(28,27,26,0.85);
      color: #fff;
      font-size: 0.68rem;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 0.3rem 0.7rem;
      border-radius: 0.4rem;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      display: none;
    }
  </style>
</head>
<body>

  <div id="slot-tooltip">클릭하면 예약링크로 이동합니다</div>

  <!-- Nav -->
  <nav class="sticky top-0 z-40 py-4 px-6"
       style="background:rgba(250,250,247,0.95); backdrop-filter:blur(12px); box-shadow:0 1px 20px rgba(0,0,0,0.06);">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex flex-col leading-none">
        <span class="text-xl font-semibold" style="font-family:'Playfair Display',serif; color:#1C1B1A;">모아라네일</span>
        <span class="text-xs font-light" style="color:#C8956C; letter-spacing:0.22em;">MOARANAIL</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="index.html">
          <button class="btn-ghost px-4 py-2 rounded-full text-sm">← 홈으로</button>
        </a>
        <a href="https://map.naver.com/p/entry/place/1428294903?entry=bmp&placePath=%2Fstylist" target="_blank" rel="noopener">
          <button class="btn-primary px-5 py-2.5 rounded-full text-sm font-medium">예약하기</button>
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-12">

    <!-- Header -->
    <div class="text-center mb-10">
      <p class="text-xs font-light mb-3" style="color:#C8956C; letter-spacing:0.28em;">BOOKING STATUS</p>
      <h1 class="text-3xl font-semibold mb-3" style="font-family:'Playfair Display',serif;">예약 현황</h1>
      <p class="text-sm" style="color:#6B6560;">예약 가능한 시간대를 확인하고 예약하세요</p>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap justify-center gap-6 mb-8">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full" style="background:#86EFAC;"></div>
        <span class="text-xs" style="color:#6B6560;">예약 가능 (클릭 시 예약 페이지로 이동)</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full" style="background:#FCA5A5;"></div>
        <span class="text-xs" style="color:#6B6560;">마감</span>
      </div>
    </div>

    <!-- Week nav -->
    <div class="flex items-center justify-between mb-5">
      <button onclick="prevWeek()" class="btn-ghost px-4 py-2 rounded-full text-sm">← 이전 주</button>
      <p id="weekLabel" class="text-sm font-medium"></p>
      <button onclick="nextWeek()" class="btn-ghost px-4 py-2 rounded-full text-sm">다음 주 →</button>
    </div>

    <!-- Schedule -->
    <div id="scheduleWrap" class="rounded-2xl overflow-hidden border" style="border-color:#F0EAE4;"></div>

    <!-- CTA -->
    <div class="text-center mt-10 py-10 rounded-3xl" style="background:linear-gradient(135deg,#FFF8F3,#F5EDE4);">
      <p class="font-medium mb-1">원하는 시간대를 확인하셨나요?</p>
      <p class="text-sm mb-6" style="color:#6B6560;">네이버 예약으로 간편하게 예약하세요</p>
      <a href="https://map.naver.com/p/entry/place/1428294903?entry=bmp&placePath=%2Fstylist" target="_blank" rel="noopener">
        <button class="btn-primary px-8 py-3.5 rounded-full font-medium">네이버로 예약하기</button>
      </a>
    </div>

  </main>

  <footer class="py-8 px-6 text-center mt-6" style="background:#1C1B1A;">
    <p class="text-xs" style="color:#555;">
      © 2024 모아라네일 · 충청남도 보령시 한내로터리길 165 · 010-4600-7902
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const NAVER_URL    = 'https://map.naver.com/p/entry/place/1428294903?entry=bmp&placePath=%2Fstylist';
    const SUPABASE_URL = 'https://tylmxvrkpukaldoznuwb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5bG14dnJrcHVrYWxkb3pudXdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYxMDQsImV4cCI6MjA5NzE5MjEwNH0.EkIjICI72zPta2bdgZlv3qL7iTT-lHi7Vo2_0YgfOdE';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TIMES = [
      '10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30',
      '14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30',
      '18:00','18:30','19:00','19:30'
    ];
    const DAY_LABELS = ['일','월','화','수','목','금','토'];

    let weekOffset  = 0;
    let bookingData = {};
    const tooltip   = document.getElementById('slot-tooltip');

    function getMondayOf(date) {
      const d = new Date(date);
      const diff = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function toKey(d) { return d.toISOString().slice(0, 10); }
    function fmt(d)   { return (d.getMonth() + 1) + '/' + d.getDate(); }

    async function loadWeekData() {
      document.getElementById('scheduleWrap').innerHTML =
        '<div style="padding:3rem;text-align:center;font-size:0.875rem;color:#9ca3af;">불러오는 중…</div>';

      const base = getMondayOf(new Date());
      base.setDate(base.getDate() + weekOffset * 7);
      const sat = new Date(base); sat.setDate(base.getDate() + 5);

      const { data } = await db.from('bookings')
        .select('date,time,status')
        .gte('date', toKey(base))
        .lte('date', toKey(sat));

      bookingData = {};
      (data || []).forEach(function(row) {
        if (!bookingData[row.date]) bookingData[row.date] = {};
        bookingData[row.date][row.time] = row.status;
      });

      renderSchedule();
    }

    function getStatus(dateKey, time) {
      return (bookingData[dateKey] && bookingData[dateKey][time]) || 'available';
    }

    function renderSchedule() {
      const base = getMondayOf(new Date());
      base.setDate(base.getDate() + weekOffset * 7);

      const days = [];
      for (var i = 0; i < 6; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        days.push(d);
      }

      const today = toKey(new Date());
      document.getElementById('weekLabel').textContent =
        fmt(days[0]) + ' (월) – ' + fmt(days[5]) + ' (토)';

      var html = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;min-width:560px;">';

      html += '<thead><tr style="background:#F5EDE4;">';
      html += '<th style="padding:0.75rem 0.5rem;text-align:left;font-size:0.7rem;font-weight:500;color:#6B6560;min-width:52px;">시간</th>';
      days.forEach(function(d) {
        const key = toKey(d);
        const isT = key === today;
        html += '<th style="padding:0.75rem 0.25rem;text-align:center;font-size:0.7rem;font-weight:500;color:' + (isT ? '#C8956C' : '#6B6560') + ';">'
          + '<div>' + DAY_LABELS[d.getDay()] + '</div>'
          + '<div style="font-size:1rem;' + (isT ? 'font-weight:700;' : '') + '">' + d.getDate() + '</div>'
          + '</th>';
      });
      html += '</tr></thead><tbody>';

      TIMES.forEach(function(time, i) {
        const rowBg = i % 2 === 0 ? '#fff' : '#FAFAF7';
        html += '<tr style="border-top:1px solid #F5F0EB;background:' + rowBg + ';">';
        html += '<td style="padding:0.25rem 0.5rem;font-size:0.68rem;font-weight:500;color:#9CA3AF;">' + time + '</td>';
        days.forEach(function(d) {
          const key    = toKey(d);
          const status = getStatus(key, time);
          if (status === 'full') {
            html += '<td style="padding:0.25rem;"><button class="slot-full">마감</button></td>';
          } else {
            html += '<td style="padding:0.25rem;">'
              + '<a href="' + NAVER_URL + '" target="_blank" rel="noopener">'
              + '<button class="slot-available">예약 가능</button>'
              + '</a></td>';
          }
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      document.getElementById('scheduleWrap').innerHTML = html;

      document.querySelectorAll('.slot-available').forEach(function(btn) {
        btn.addEventListener('mouseenter', function() { tooltip.style.display = 'block'; });
        btn.addEventListener('mousemove',  function(e) {
          tooltip.style.left = (e.clientX + 14) + 'px';
          tooltip.style.top  = (e.clientY - 38) + 'px';
        });
        btn.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
      });
    }

    function prevWeek() { weekOffset--; loadWeekData(); }
    function nextWeek() { weekOffset++; loadWeekData(); }

    loadWeekData();
  </script>

</body>
</html>
